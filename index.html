/* ═══ TESTIMONIAL CAROUSEL (pink quotes, arrows, name — exact RAS) ═══ */
const TestimonialCarousel = ({ quotes }) => {
  const [idx, setIdx] = useState(0);
  useEffect(() => { const t = setInterval(() => setIdx(i => (i+1)%quotes.length), 6000); return () => clearInterval(t); }, [quotes.length]);
  const q = quotes[idx];
  return (
    <section style={{ background:C.white, padding:"64px 24px", textAlign:"center" }}>
      <h2 style={{ fontFamily:Fh, fontSize:"clamp(26px,5vw,40px)", fontWeight:900, color:C.navy, textTransform:"uppercase", marginBottom:32 }}>Parents Love<br/>Legacy Rise Academy</h2>
      <div style={{ maxWidth:650, margin:"0 auto", position:"relative", minHeight:200 }}>
        {/* Quote marks */}
        <div style={{ fontFamily:"Georgia,serif", fontSize:72, color:C.accent, lineHeight:1, marginBottom:8 }}>"</div>
        <p style={{ fontFamily:Fb, fontSize:17, color:C.navy, lineHeight:1.7, marginBottom:20 }}>{q.text}</p>
        <div style={{ fontFamily:Fh, fontSize:13, fontWeight:700, color:C.navy, letterSpacing:2, textTransform:"uppercase" }}>— {q.name}</div>
        {/* Arrows */}
        {[["left",() => setIdx((idx-1+quotes.length)%quotes.length),"‹"],["right",() => setIdx((idx+1)%quotes.length),"›"]].map(([side,fn,ch]) => (

      </div>
    </section>
  );
};

        </div>

          <span style={{ fontFamily:Fh, fontSize:13, fontWeight:600, color:C.navy, cursor:"pointer" }}>Blog</span>
          <span style={{ fontFamily:Fh, fontSize:13, fontWeight:600, color:C.accent, cursor:"pointer" }}><svg width="14" height="14" viewBox="0 0 24 24" fill="#FF3B6B" style={{display:"inline",verticalAlign:"middle",marginRight:4}}><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg> Heart of LRA</span>
          <button onClick={() => go("join")} style={{ background:C.accentGrad, color:C.white, border:"none", borderRadius:30, padding:"12px 28px", fontFamily:Fh, fontWeight:800, fontSize:14, textTransform:"uppercase", letterSpacing:0.5, cursor:"pointer", boxShadow:`0 4px 16px ${C.accent}44` }}>Enroll Now</button>

/* ═══ FORM (Formspree) ═══ */
const Form = ({ blue }) => {
  const [sent, setSent] = useState(false);
  const [ld, setLd] = useState(false);
  const sub = async (e) => { e.preventDefault(); setLd(true); try { await fetch(`https://formspree.io/f/${CFG.formspreeId}`, {method:"POST",body:new FormData(e.target),headers:{Accept:"application/json"}}); setSent(true); } catch { alert("Error"); } setLd(false); };
  if (sent) return <div style={{ textAlign:"center", padding:32 }}><div style={{ fontSize:32, color:blue?C.white:C.gold, fontWeight:800, marginBottom:8 }}><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20,6 9,17 4,12"/></svg></div><h3 style={{ fontFamily:Fh, fontSize:20, color:blue?C.white:C.navy }}>Thank You!</h3><p style={{ fontFamily:Fb, fontSize:14, color:blue?"rgba(255,255,255,0.8)":C.gray }}>We'll reach out within 24–48 hours.</p></div>;
  const lbl = { fontFamily:Fh, fontSize:13, fontWeight:700, color:blue?C.white:C.navy, display:"block", marginBottom:6 };
  const inp = { width:"100%", padding:"14px 16px", border:"none", borderRadius:8, fontFamily:Fb, fontSize:15, outline:"none", boxSizing:"border-box", background:blue?"rgba(255,255,255,0.95)":"#F0F2F5" };
  return (
    <form onSubmit={sub}>
      <div style={{ marginBottom:14 }}><label style={lbl}>First Name <span style={{ color:C.accent }}>*</span></label><input name="first_name" required style={inp}/></div>
      <div style={{ marginBottom:14 }}><label style={lbl}>Last Name <span style={{ color:C.accent }}>*</span></label><input name="last_name" required style={inp}/></div>
      <div style={{ marginBottom:14 }}><label style={lbl}>Email Address <span style={{ color:C.accent }}>*</span></label><input name="email" type="email" required style={inp}/></div>
      <div style={{ marginBottom:14 }}><label style={lbl}>Phone Number (optional)</label><input name="phone" style={inp}/></div>
      <div style={{ marginBottom:14 }}><label style={lbl}>State <span style={{ color:C.accent }}>*</span></label><select name="state" required style={{...inp, background:blue?"rgba(255,255,255,0.95)":"#F0F2F5"}}><option value="">Please select...</option><option>Georgia</option><option>Other</option></select></div>
      <div style={{ marginBottom:20 }}><label style={lbl}>District</label><input name="district" style={inp}/></div>
      <button type="submit" disabled={ld} style={{ background:C.accentGrad, color:C.white, border:"none", borderRadius:30, padding:"16px 48px", fontFamily:Fh, fontWeight:800, fontSize:16, textTransform:"uppercase", letterSpacing:1, cursor:"pointer", opacity:ld?0.7:1, boxShadow:`0 4px 18px ${C.accent}44` }}>Submit</button>
    </form>
  );
};

        <p style={{ fontFamily:Fb, fontSize:15, color:C.gray, maxWidth:480, margin:"0 auto 24px" }}>Let's build bright futures together.</p>
        <div style={{ display:"flex", gap:14, justifyContent:"center", flexWrap:"wrap" }}>
          <button onClick={() => go("join")} style={{ background:C.gold, color:C.white, border:"none", borderRadius:30, padding:"13px 30px", fontFamily:Fh, fontWeight:800, fontSize:14, textTransform:"uppercase", cursor:"pointer" }}>Contact Us</button>
          <a href={CFG.goFundMe} target="_blank" rel="noreferrer" style={{ background:C.accentGrad, color:C.white, border:"none", borderRadius:30, padding:"13px 30px", fontFamily:Fh, fontWeight:800, fontSize:14, textTransform:"uppercase", cursor:"pointer", textDecoration:"none", display:"inline-block" }}>Donate Now</a>
        </div>
      </div>
    </div>
  </section>
  {/* CTA band */}
  <section style={{ background:"linear-gradient(135deg,#FF1654,#FF6B8A)", padding:"56px 24px", textAlign:"center" }}>
    <h2 style={{ fontFamily:Fh, fontSize:"clamp(20px,4vw,28px)", fontWeight:800, color:C.white, marginBottom:20 }}>Are you a school or community leader looking for onsite childcare support?</h2>
    <button onClick={() => go("join")} style={{ background:C.navy, color:C.white, border:"none", borderRadius:30, padding:"14px 36px", fontFamily:Fh, fontWeight:800, fontSize:15, textTransform:"uppercase", cursor:"pointer" }}>Learn More</button>
  </section>
</>);

/* ═══ APP ═══ */
function App() {
  const [page, setPage] = useState("home");
  const go = (p) => { setPage(p); window.scrollTo({ top:0, behavior:"smooth" }); };
  return (
    <div style={{ fontFamily:Fb, background:C.white, minHeight:"100vh" }}>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin="anonymous" />
      <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
      <style>{`
        *{box-sizing:border-box;margin:0;padding:0}body{margin:0}input,select,textarea,button{font-family:inherit}img{max-width:100%}
        @media(max-width:768px){.dN{display:none!important}.mB{display:flex!important}}
        @media(min-width:769px){.mB{display:none!important}.mM{display:none!important}}
      `}</style>
      <Nav page={page} go={go} />
      {page==="home"&&<Home go={go}/>}
      {page==="about"&&<About go={go}/>}
      {page==="programs"&&<Programs go={go}/>}
      {page==="join"&&<Join go={go}/>}
      {page==="register"&&<Register go={go}/>}
      {page==="partners"&&<Partners go={go}/>}
      <Foot go={go} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
